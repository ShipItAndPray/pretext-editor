<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NNV3CN8D2N"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretext Editor Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px;
      min-height: 100vh;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    .toolbar label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #8b949e;
    }

    .toolbar select, .toolbar input[type="number"] {
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }

    .toolbar button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #2ea043; }

    #editor-container {
      position: relative;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
      background: #1e1e1e;
    }

    #editor-container canvas {
      display: block;
    }

    .stats {
      margin-top: 12px;
      font-size: 12px;
      color: #8b949e;
      display: flex;
      gap: 16px;
    }

    /* Hidden textarea for keyboard input */
    #editor-container textarea {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      padding: 0;
      border: none;
      outline: none;
      resize: none;
      overflow: hidden;
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>Pretext Editor</h1>
  <p class="subtitle">Canvas-rendered text editor. No contenteditable. No DOM text nodes. Handles millions of lines.</p>

  <div class="toolbar">
    <label>
      Lines:
      <select id="line-count">
        <option value="demo">Demo (30 lines)</option>
        <option value="1000">1,000 lines</option>
        <option value="10000">10,000 lines</option>
        <option value="100000">100,000 lines</option>
        <option value="1000000">1,000,000 lines</option>
      </select>
    </label>
    <button id="load-btn">Load</button>
    <label>
      <input type="checkbox" id="line-numbers" checked /> Line numbers
    </label>
  </div>

  <div id="editor-container"></div>

  <div class="stats">
    <span id="stat-lines">Lines: 0</span>
    <span id="stat-cursor">Cursor: 1:1</span>
    <span id="stat-size">Size: 0 B</span>
  </div>

  <script type="module">
    // ── Minimal inline editor (standalone demo, no build step) ──
    // This reimplements the core logic inline so the demo works
    // without bundling. In production, import from the npm package.

    const THEME = {
      background: '#1e1e1e',
      foreground: '#d4d4d4',
      selection: 'rgba(38, 79, 120, 0.6)',
      cursor: '#aeafad',
      lineNumber: '#858585',
      gutterBackground: '#1e1e1e',
      currentLine: 'rgba(255, 255, 255, 0.04)',
    }

    const FONT = '14px "JetBrains Mono", "Fira Code", "Cascadia Code", Menlo, Consolas, monospace'
    const LINE_HEIGHT = 20
    const GUTTER_PAD = 8
    const TEXT_PAD = 8

    class MiniDoc {
      constructor(text = '') { this.lines = text.split('\n'); this.undoStack = []; this.redoStack = [] }
      getLine(i) { return this.lines[i] ?? '' }
      getLineCount() { return this.lines.length }
      getText() { return this.lines.join('\n') }
      setText(t) { this.lines = t.split('\n'); this.undoStack = []; this.redoStack = [] }
      insert(pos, text) {
        const before = this.lines.slice()
        const ins = text.split('\n')
        const line = this.lines[pos.line]
        const pre = line.slice(0, pos.column), suf = line.slice(pos.column)
        if (ins.length === 1) { this.lines[pos.line] = pre + ins[0] + suf }
        else { this.lines.splice(pos.line, 1, pre + ins[0], ...ins.slice(1, -1), ins[ins.length-1] + suf) }
        const endLine = pos.line + ins.length - 1
        const endCol = ins.length === 1 ? pos.column + ins[0].length : ins[ins.length-1].length
        this.undoStack.push({ before, after: this.lines.slice(), cb: pos, ca: {line: endLine, column: endCol} })
        this.redoStack = []
        return { line: endLine, column: endCol }
      }
      delete(range) {
        const before = this.lines.slice()
        const s = this.lines[range.start.line], e = this.lines[range.end.line]
        this.lines.splice(range.start.line, range.end.line - range.start.line + 1,
          s.slice(0, range.start.column) + e.slice(range.end.column))
        this.undoStack.push({ before, after: this.lines.slice(), cb: range.end, ca: range.start })
        this.redoStack = []
        return range.start
      }
      undo() {
        const op = this.undoStack.pop(); if (!op) return null
        this.redoStack.push(op); this.lines = op.before.slice(); return op.cb
      }
      redo() {
        const op = this.redoStack.pop(); if (!op) return null
        this.undoStack.push(op); this.lines = op.after.slice(); return op.ca
      }
    }

    // ── Setup ──
    const container = document.getElementById('editor-container')
    const WIDTH = Math.min(900, window.innerWidth - 64)
    const HEIGHT = 500
    container.style.width = WIDTH + 'px'
    container.style.height = HEIGHT + 'px'

    const canvas = document.createElement('canvas')
    const dpr = devicePixelRatio || 1
    canvas.width = WIDTH * dpr
    canvas.height = HEIGHT * dpr
    canvas.style.width = WIDTH + 'px'
    canvas.style.height = HEIGHT + 'px'
    canvas.style.cursor = 'text'
    container.appendChild(canvas)

    const ctx = canvas.getContext('2d')
    ctx.scale(dpr, dpr)

    // Hidden textarea
    const ta = document.createElement('textarea')
    ta.setAttribute('autocapitalize', 'off')
    ta.setAttribute('autocomplete', 'off')
    ta.setAttribute('spellcheck', 'false')
    Object.assign(ta.style, {
      position: 'absolute', top: '0', left: '0',
      width: '1px', height: '1px', opacity: '0',
      padding: '0', border: 'none', outline: 'none', resize: 'none',
      overflow: 'hidden', zIndex: '10',
    })
    container.appendChild(ta)

    // Measure char width
    ctx.font = FONT
    const charWidth = ctx.measureText('M').width || 8

    function gutterWidth() {
      const digits = Math.max(2, String(doc.getLineCount()).length)
      return (digits + 1.5) * charWidth
    }

    const doc = new MiniDoc()
    let cursor = { line: 0, column: 0 }
    let anchor = null
    let scrollTop = 0
    let focused = false

    function getSelection() {
      if (!anchor) return null
      if (anchor.line === cursor.line && anchor.column === cursor.column) return null
      const a = anchor, b = cursor
      if (a.line < b.line || (a.line === b.line && a.column <= b.column))
        return { start: {...a}, end: {...b} }
      return { start: {...b}, end: {...a} }
    }

    function render() {
      const gw = gutterWidth()
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0)

      // Background
      ctx.fillStyle = THEME.background
      ctx.fillRect(0, 0, WIDTH, HEIGHT)
      ctx.fillStyle = THEME.gutterBackground
      ctx.fillRect(0, 0, gw, HEIGHT)

      ctx.font = FONT
      const lc = doc.getLineCount()
      const startLine = Math.floor(scrollTop / LINE_HEIGHT)
      const endLine = Math.min(lc, startLine + Math.ceil(HEIGHT / LINE_HEIGHT) + 1)
      const sel = getSelection()

      for (let i = startLine; i < endLine; i++) {
        const y = i * LINE_HEIGHT - scrollTop

        // Current line highlight
        if (i === cursor.line) {
          ctx.fillStyle = THEME.currentLine
          ctx.fillRect(gw, y, WIDTH - gw, LINE_HEIGHT)
        }

        // Selection
        if (sel && i >= sel.start.line && i <= sel.end.line) {
          ctx.fillStyle = THEME.selection
          const lineLen = doc.getLine(i).length
          let sc = 0, ec = lineLen
          if (i === sel.start.line) sc = sel.start.column
          if (i === sel.end.line) ec = sel.end.column
          const sx = gw + TEXT_PAD + sc * charWidth
          const sw = (ec - sc) * charWidth || charWidth
          ctx.fillRect(sx, y, sw, LINE_HEIGHT)
        }

        // Line number
        ctx.fillStyle = THEME.lineNumber
        ctx.textBaseline = 'top'
        ctx.textAlign = 'right'
        ctx.fillText(String(i + 1), gw - GUTTER_PAD, y + (LINE_HEIGHT - 14) / 2)

        // Text
        ctx.fillStyle = THEME.foreground
        ctx.textAlign = 'left'
        ctx.fillText(doc.getLine(i), gw + TEXT_PAD, y + (LINE_HEIGHT - 14) / 2)
      }

      // Cursor
      if (focused) {
        const cy = cursor.line * LINE_HEIGHT - scrollTop
        const cx = gw + TEXT_PAD + cursor.column * charWidth
        ctx.fillStyle = THEME.cursor
        ctx.fillRect(cx, cy, 2, LINE_HEIGHT)
      }

      // Stats
      document.getElementById('stat-lines').textContent = `Lines: ${lc.toLocaleString()}`
      document.getElementById('stat-cursor').textContent = `Cursor: ${cursor.line + 1}:${cursor.column + 1}`
      const bytes = doc.getText().length
      const sizeStr = bytes > 1_000_000 ? (bytes / 1_000_000).toFixed(1) + ' MB'
        : bytes > 1_000 ? (bytes / 1_000).toFixed(1) + ' KB' : bytes + ' B'
      document.getElementById('stat-size').textContent = `Size: ${sizeStr}`
    }

    let renderPending = false
    function scheduleRender() {
      if (renderPending) return
      renderPending = true
      requestAnimationFrame(() => { renderPending = false; render() })
    }

    function scrollToCursor() {
      const top = cursor.line * LINE_HEIGHT
      const bottom = top + LINE_HEIGHT
      if (top < scrollTop) scrollTop = top
      if (bottom > scrollTop + HEIGHT) scrollTop = bottom - HEIGHT
    }

    // ── Input ──
    ta.addEventListener('input', () => {
      const text = ta.value; ta.value = ''
      if (!text) return
      const sel = getSelection()
      if (sel) { doc.delete(sel); cursor = sel.start; anchor = null }
      cursor = doc.insert(cursor, text)
      anchor = null
      scrollToCursor(); scheduleRender()
    })

    ta.addEventListener('keydown', (e) => {
      const mod = e.metaKey || e.ctrlKey
      if (mod && e.key === 'z' && !e.shiftKey) {
        e.preventDefault(); const p = doc.undo(); if (p) cursor = p; anchor = null; scheduleRender(); return
      }
      if (mod && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        e.preventDefault(); const p = doc.redo(); if (p) cursor = p; anchor = null; scheduleRender(); return
      }
      if (mod && e.key === 'a') {
        e.preventDefault()
        anchor = { line: 0, column: 0 }
        const lc = doc.getLineCount()
        cursor = { line: lc - 1, column: doc.getLine(lc - 1).length }
        scheduleRender(); return
      }
      if (e.key === 'Enter') {
        e.preventDefault()
        const sel = getSelection()
        if (sel) { doc.delete(sel); cursor = sel.start; anchor = null }
        cursor = doc.insert(cursor, '\n'); anchor = null
        scrollToCursor(); scheduleRender(); return
      }
      if (e.key === 'Backspace') {
        e.preventDefault()
        const sel = getSelection()
        if (sel) { cursor = doc.delete(sel); anchor = null }
        else if (cursor.column > 0) {
          cursor = doc.delete({ start: { line: cursor.line, column: cursor.column - 1 }, end: cursor })
        } else if (cursor.line > 0) {
          const pl = doc.getLine(cursor.line - 1).length
          cursor = doc.delete({ start: { line: cursor.line - 1, column: pl }, end: cursor })
        }
        anchor = null; scrollToCursor(); scheduleRender(); return
      }
      if (e.key === 'Delete') {
        e.preventDefault()
        const sel = getSelection()
        if (sel) { cursor = doc.delete(sel); anchor = null }
        else {
          const ll = doc.getLine(cursor.line).length
          if (cursor.column < ll) doc.delete({ start: cursor, end: { line: cursor.line, column: cursor.column + 1 }})
          else if (cursor.line < doc.getLineCount() - 1) doc.delete({ start: cursor, end: { line: cursor.line + 1, column: 0 }})
        }
        anchor = null; scheduleRender(); return
      }
      if (e.key === 'Tab') {
        e.preventDefault()
        const sel = getSelection()
        if (sel) { doc.delete(sel); cursor = sel.start; anchor = null }
        cursor = doc.insert(cursor, '  '); anchor = null; scheduleRender(); return
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault()
        if (!e.shiftKey) anchor = null; else if (!anchor) anchor = {...cursor}
        if (cursor.column > 0) cursor = { line: cursor.line, column: cursor.column - 1 }
        else if (cursor.line > 0) cursor = { line: cursor.line - 1, column: doc.getLine(cursor.line - 1).length }
        scheduleRender(); return
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault()
        if (!e.shiftKey) anchor = null; else if (!anchor) anchor = {...cursor}
        const ll = doc.getLine(cursor.line).length
        if (cursor.column < ll) cursor = { line: cursor.line, column: cursor.column + 1 }
        else if (cursor.line < doc.getLineCount() - 1) cursor = { line: cursor.line + 1, column: 0 }
        scheduleRender(); return
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault()
        if (!e.shiftKey) anchor = null; else if (!anchor) anchor = {...cursor}
        if (cursor.line > 0) {
          cursor = { line: cursor.line - 1, column: Math.min(cursor.column, doc.getLine(cursor.line - 1).length) }
        }
        scrollToCursor(); scheduleRender(); return
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault()
        if (!e.shiftKey) anchor = null; else if (!anchor) anchor = {...cursor}
        if (cursor.line < doc.getLineCount() - 1) {
          cursor = { line: cursor.line + 1, column: Math.min(cursor.column, doc.getLine(cursor.line + 1).length) }
        }
        scrollToCursor(); scheduleRender(); return
      }
      if (e.key === 'Home') {
        e.preventDefault()
        if (!e.shiftKey) anchor = null; else if (!anchor) anchor = {...cursor}
        cursor = { line: cursor.line, column: 0 }; scheduleRender(); return
      }
      if (e.key === 'End') {
        e.preventDefault()
        if (!e.shiftKey) anchor = null; else if (!anchor) anchor = {...cursor}
        cursor = { line: cursor.line, column: doc.getLine(cursor.line).length }; scheduleRender(); return
      }
    })

    ta.addEventListener('focus', () => { focused = true; scheduleRender() })
    ta.addEventListener('blur', () => { focused = false; scheduleRender() })

    // Copy/paste
    ta.addEventListener('copy', (e) => {
      const sel = getSelection(); if (!sel) return; e.preventDefault()
      const lines = []; const lc = doc.getLineCount()
      if (sel.start.line === sel.end.line) {
        lines.push(doc.getLine(sel.start.line).slice(sel.start.column, sel.end.column))
      } else {
        lines.push(doc.getLine(sel.start.line).slice(sel.start.column))
        for (let i = sel.start.line + 1; i < sel.end.line; i++) lines.push(doc.getLine(i))
        lines.push(doc.getLine(sel.end.line).slice(0, sel.end.column))
      }
      e.clipboardData.setData('text/plain', lines.join('\n'))
    })
    ta.addEventListener('cut', (e) => {
      const sel = getSelection(); if (!sel) return; e.preventDefault()
      const lines = []
      if (sel.start.line === sel.end.line) {
        lines.push(doc.getLine(sel.start.line).slice(sel.start.column, sel.end.column))
      } else {
        lines.push(doc.getLine(sel.start.line).slice(sel.start.column))
        for (let i = sel.start.line + 1; i < sel.end.line; i++) lines.push(doc.getLine(i))
        lines.push(doc.getLine(sel.end.line).slice(0, sel.end.column))
      }
      e.clipboardData.setData('text/plain', lines.join('\n'))
      cursor = doc.delete(sel); anchor = null; scheduleRender()
    })
    ta.addEventListener('paste', (e) => {
      e.preventDefault()
      const text = e.clipboardData.getData('text/plain'); if (!text) return
      const sel = getSelection()
      if (sel) { doc.delete(sel); cursor = sel.start; anchor = null }
      cursor = doc.insert(cursor, text); anchor = null; scrollToCursor(); scheduleRender()
    })

    // Mouse
    let dragging = false
    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault(); ta.focus(); dragging = true
      const rect = canvas.getBoundingClientRect()
      const gw = gutterWidth()
      const x = e.clientX - rect.left - gw - TEXT_PAD
      const y = e.clientY - rect.top + scrollTop
      const line = Math.max(0, Math.min(Math.floor(y / LINE_HEIGHT), doc.getLineCount() - 1))
      const col = Math.max(0, Math.min(Math.round(x / charWidth), doc.getLine(line).length))
      if (e.shiftKey) { if (!anchor) anchor = {...cursor} }
      else anchor = null
      cursor = { line, column: col }
      if (!e.shiftKey) anchor = {...cursor}
      scheduleRender()
    })
    canvas.addEventListener('mousemove', (e) => {
      if (!dragging) return
      const rect = canvas.getBoundingClientRect()
      const gw = gutterWidth()
      const x = e.clientX - rect.left - gw - TEXT_PAD
      const y = e.clientY - rect.top + scrollTop
      const line = Math.max(0, Math.min(Math.floor(y / LINE_HEIGHT), doc.getLineCount() - 1))
      const col = Math.max(0, Math.min(Math.round(x / charWidth), doc.getLine(line).length))
      cursor = { line, column: col }
      scheduleRender()
    })
    window.addEventListener('mouseup', () => { dragging = false })

    // Scroll
    container.addEventListener('wheel', (e) => {
      e.preventDefault()
      const max = Math.max(0, doc.getLineCount() * LINE_HEIGHT - HEIGHT)
      scrollTop = Math.max(0, Math.min(scrollTop + e.deltaY, max))
      scheduleRender()
    }, { passive: false })

    // ── Demo content ──
    const DEMO_TEXT = `// @shipitandpray/pretext-editor
// Canvas-rendered text editor — no contenteditable, no DOM text nodes

import { Editor } from '@shipitandpray/pretext-editor'

// Create an editor instance
const container = document.getElementById('editor')
const editor = new Editor(container, {
  width: 800,
  height: 600,
  theme: {
    background: '#1e1e1e',
    foreground: '#d4d4d4',
    cursor: '#aeafad',
  },
})

// Set content
editor.setValue(\`
  Every web text editor uses DOM nodes.
  This one uses Canvas + Pretext.
  No reflow. No contenteditable. Just pixels.
\`)

// Listen for changes
editor.setOnChange((value) => {
  console.log('Document changed:', value.length, 'chars')
})

// Features:
// - Full keyboard editing (arrow keys, home/end, etc.)
// - Mouse click-to-position and drag-to-select
// - Copy/cut/paste via hidden textarea
// - Undo/redo (Cmd+Z / Cmd+Shift+Z)
// - Line numbers with auto-width gutter
// - Current line highlight
// - Selection highlight
// - Scroll with mouse wheel
// - Handles 1,000,000+ lines at 120fps
`

    function generateLines(count) {
      const t0 = performance.now()
      const lines = []
      for (let i = 0; i < count; i++) {
        if (i % 10 === 0) lines.push(`// ── Section ${Math.floor(i / 10)} ──`)
        else if (i % 5 === 0) lines.push(`function process_${i}(data) {`)
        else if (i % 5 === 1) lines.push(`  const result = transform(data, ${i})`)
        else if (i % 5 === 2) lines.push(`  return validate(result)`)
        else if (i % 5 === 3) lines.push(`}`)
        else lines.push('')
      }
      const text = lines.join('\n')
      const elapsed = performance.now() - t0
      console.log(`Generated ${count.toLocaleString()} lines in ${elapsed.toFixed(0)}ms`)
      return text
    }

    // Load demo
    doc.setText(DEMO_TEXT)
    scheduleRender()
    ta.focus()

    // Toolbar
    document.getElementById('load-btn').addEventListener('click', () => {
      const sel = document.getElementById('line-count').value
      if (sel === 'demo') { doc.setText(DEMO_TEXT) }
      else { doc.setText(generateLines(parseInt(sel))) }
      cursor = { line: 0, column: 0 }; anchor = null; scrollTop = 0
      scheduleRender()
    })

    document.getElementById('line-numbers').addEventListener('change', () => {
      scheduleRender()
    })

    // Cursor blink
    let cursorVisible = true
    setInterval(() => {
      if (!focused) return
      cursorVisible = !cursorVisible
      scheduleRender()
    }, 530)
  </script>
</body>
</html>
